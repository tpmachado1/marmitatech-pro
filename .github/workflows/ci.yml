name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --no-cache -t marmitatech:${{ github.sha }} .

      - name: Install dependencies (validate)
        run: |
          node --version
          npm ci
        env:
          CI: true
